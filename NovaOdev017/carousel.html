<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nova Ödev 017</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

  <style>

    body {
      background-color: #111827;
      min-height: 100vh;
    }

    .carousel-box {
      max-width: 900px;
      overflow: hidden;
    }

    .carousel-item {
      height: 550px;
      border-radius: 25px;
    }

    .slide-1 {
      background: linear-gradient(166deg,rgba(0, 32, 36, 1) 11%, rgba(9, 43, 121, 1) 35%, rgba(0, 247, 255, 1) 91%);

    }

    .slide-2 {
      background: linear-gradient(166deg,rgba(0, 247, 255, 1) 11%, rgba(69, 9, 121, 1) 44%, rgba(0, 255, 115, 1) 91%);
    }

    .slide-3 {
      background: linear-gradient(166deg,rgba(0, 255, 115, 1) 11%, rgba(10, 173, 154, 1) 44%, rgba(36, 9, 186, 1) 91%);
    }

    .slide-content {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: baseline;
      flex-direction: column;
      margin-left: 150px;
      font-family: Arial, Helvetica, sans-serif;

    }

    .slide-content h1 {
      font-size: 50px;
    }

    .slide-content p {
      font-size: 20px;
    }

    .slide-2 a {
      color: white;
      text-decoration: none;
    }








  </style>

  <body>

    <div class="container carousel-box">
      <div id="carouselders" class="carousel slide carousel-fade">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#carouselders" data-bs-slide-to="0" class="active"></button>
          <button type="button" data-bs-target="#carouselders" data-bs-slide-to="1"></button>
          <button type="button" data-bs-target="#carouselders" data-bs-slide-to="2"></button>
        </div>

        <div class="carousel-inner">
          <div class="carousel-item active slide-1">
            <div class="slide-content">
            <h1>Ahmet Stone</h1>
            <p>En sevdiğim metalci</p>
            <button type="button" class="btn btn-primary">Dinle</button>
            </div>
          </div>
          <div class="carousel-item active slide-2">
            <div class="slide-content">
            <h1>Arda Hoca</h1>
            <p>TEK KİŞİLİK DEV KADRO</p>
            <button type="button" class="btn btn-primary"><a href="https://github.com/arda-ozcan" target="_blank" rel="noopener noreferrer">Profili Gör</a></button>
            </div>
          </div>
          <div class="carousel-item active slide-3">
            <div class="slide-content">
            <h1>Attack on titan</h1>
            <p>İyi güzel ama overrated</p>
            <button type="button" class="btn btn-primary">İzle</button>
            </div>
          </div>
        </div>
        
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselders" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselders" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </div>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
